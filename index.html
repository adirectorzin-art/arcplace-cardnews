<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0b" />

  <title>건설 로봇을 팔지 않는 건설 로봇 회사</title>
  <meta name="description" content="Monumental 사례로 보는 AI·로봇 시대의 경쟁 방식 — 국보디자인 DX 사업본부 카드뉴스" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="건설 로봇을 팔지 않는 건설 로봇 회사" />
  <meta property="og:description" content="고객은 건물만 산다. 도구가 아니라 완성된 결과를 파는 회사의 방식." />
  <meta property="og:image" content="card_01.png" />

  <style>
    :root {
      --bg: #080808;
      --panel: #111;
      --text: #f6f6f6;
      --muted: #999;
      --gold: #b68a42;
      --line: rgba(255,255,255,.14);
      --shadow: 0 24px 70px rgba(0,0,0,.55);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family:
        SUITE,
        "Pretendard",
        "Noto Sans KR",
        "Apple SD Gothic Neo",
        "Malgun Gothic",
        sans-serif;
    }

    body {
      min-height: 100svh;
      overflow-x: hidden;
    }

    button {
      font: inherit;
    }

    .page {
      min-height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
      padding:
        max(18px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(16px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
    }

    .header {
      width: min(100%, 1180px);
      margin: 0 auto;
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
    }

    .title-wrap {
      min-width: 0;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .14em;
    }

    h1 {
      margin: 0;
      font-size: clamp(19px, 2.2vw, 30px);
      line-height: 1.28;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .counter {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .08em;
    }

    .viewer {
      width: min(100%, 1180px);
      margin: 0 auto;
      min-height: 0;
      display: grid;
      place-items: center;
      position: relative;
    }

    .stage {
      width: min(100%, 620px);
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      background: var(--panel);
      box-shadow: var(--shadow);
      touch-action: pan-y;
      user-select: none;
    }

    .track {
      display: flex;
      transition: transform .42s cubic-bezier(.22,.61,.36,1);
      will-change: transform;
    }

    .slide {
      min-width: 100%;
      display: grid;
      place-items: center;
      background: #000;
    }

    .slide img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 4 / 5;
      object-fit: contain;
      background: #000;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 5;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.22);
      background: rgba(0,0,0,.52);
      color: #fff;
      display: grid;
      place-items: center;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: .2s ease;
    }

    .nav-btn:hover {
      background: rgba(182,138,66,.88);
      border-color: transparent;
    }

    .nav-btn:disabled {
      opacity: .22;
      cursor: default;
    }

    .nav-btn.prev {
      left: max(10px, calc(50% - 360px));
    }

    .nav-btn.next {
      right: max(10px, calc(50% - 360px));
    }

    .nav-btn svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .footer {
      width: min(100%, 1180px);
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .dots {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .dot {
      width: 8px;
      height: 8px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: #454545;
      cursor: pointer;
      transition: .22s ease;
    }

    .dot.active {
      width: 28px;
      background: var(--gold);
    }

    .help {
      text-align: center;
      color: #6f6f6f;
      font-size: 12px;
      letter-spacing: .02em;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 760px) {
      .page {
        gap: 12px;
        padding-left: 0;
        padding-right: 0;
      }

      .header,
      .footer {
        width: 100%;
        padding-left: 16px;
        padding-right: 16px;
      }

      .counter {
        font-size: 12px;
      }

      .stage {
        width: min(100%, 540px);
        border-radius: 0;
      }

      .nav-btn {
        width: 42px;
        height: 42px;
      }

      .nav-btn.prev {
        left: 10px;
      }

      .nav-btn.next {
        right: 10px;
      }
    }

    @media (hover: none) and (pointer: coarse) {
      .nav-btn {
        opacity: .72;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .track {
        transition: none;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div class="title-wrap">
        <p class="eyebrow">KUKBO INSIGHT</p>
        <h1>건설 로봇을 팔지 않는 건설 로봇 회사</h1>
      </div>
      <div class="counter" aria-live="polite">
        <span id="current">01</span> / 10
      </div>
    </header>

    <section class="viewer" aria-label="카드뉴스 슬라이드">
      <button class="nav-btn prev" type="button" aria-label="이전 카드">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>

      <div class="stage" id="stage" tabindex="0">
        <div class="track" id="track">
          <article class="slide"><img src="card_01.png" alt="카드 1. 건설 로봇을 팔지 않는 건설 로봇 회사, 고객은 건물만 산다." /></article>
          <article class="slide"><img src="card_02.png" alt="카드 2. 현장에 온 건 로봇, 고객이 산 건 결과." loading="lazy" /></article>
          <article class="slide"><img src="card_03.png" alt="카드 3. 사람이 부족해서다." loading="lazy" /></article>
          <article class="slide"><img src="card_04.png" alt="카드 4. 로봇을 팔지 않는다." loading="lazy" /></article>
          <article class="slide"><img src="card_05.png" alt="카드 5. 위험까지 직접 떠안는다." loading="lazy" /></article>
          <article class="slide"><img src="card_06.png" alt="카드 6. 건설은 원래 결과를 팔았다." loading="lazy" /></article>
          <article class="slide"><img src="card_07.png" alt="카드 7. 소프트웨어였다." loading="lazy" /></article>
          <article class="slide"><img src="card_08.png" alt="카드 8. 검토된 결과와 최종 책임." loading="lazy" /></article>
          <article class="slide"><img src="card_09.png" alt="카드 9. 인테리어 설계·시공도 같은 흐름을 맞이한다." loading="lazy" /></article>
          <article class="slide"><img src="card_10.png" alt="카드 10. 도구를 팔지 말고 결과를 팔아라." loading="lazy" /></article>
        </div>
      </div>

      <button class="nav-btn next" type="button" aria-label="다음 카드">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M9 18l6-6-6-6"/>
        </svg>
      </button>
    </section>

    <footer class="footer">
      <nav class="dots" id="dots" aria-label="카드 바로가기"></nav>
      <div class="help">클릭·스와이프 또는 키보드 방향키로 넘길 수 있습니다.</div>
    </footer>
  </main>

  <script>
    (() => {
      const track = document.getElementById('track');
      const stage = document.getElementById('stage');
      const slides = [...document.querySelectorAll('.slide')];
      const prevBtn = document.querySelector('.prev');
      const nextBtn = document.querySelector('.next');
      const dotsWrap = document.getElementById('dots');
      const currentEl = document.getElementById('current');

      let index = 0;
      let startX = 0;
      let deltaX = 0;
      let dragging = false;

      slides.forEach((_, i) => {
        const button = document.createElement('button');
        button.className = 'dot';
        button.type = 'button';
        button.setAttribute('aria-label', `${i + 1}번 카드로 이동`);
        button.addEventListener('click', () => goTo(i));
        dotsWrap.appendChild(button);
      });

      const dots = [...dotsWrap.children];

      function goTo(nextIndex) {
        index = Math.max(0, Math.min(slides.length - 1, nextIndex));
        track.style.transform = `translateX(-${index * 100}%)`;

        currentEl.textContent = String(index + 1).padStart(2, '0');
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === slides.length - 1;

        dots.forEach((dot, i) => {
          dot.classList.toggle('active', i === index);
          dot.setAttribute('aria-current', i === index ? 'true' : 'false');
        });
      }

      function next() {
        goTo(index + 1);
      }

      function prev() {
        goTo(index - 1);
      }

      prevBtn.addEventListener('click', prev);
      nextBtn.addEventListener('click', next);

      stage.addEventListener('click', (event) => {
        if (Math.abs(deltaX) > 8) return;
        const rect = stage.getBoundingClientRect();
        const clickX = event.clientX - rect.left;
        clickX < rect.width / 2 ? prev() : next();
      });

      stage.addEventListener('keydown', (event) => {
        if (event.key === 'ArrowRight' || event.key === 'PageDown') {
          event.preventDefault();
          next();
        }

        if (event.key === 'ArrowLeft' || event.key === 'PageUp') {
          event.preventDefault();
          prev();
        }

        if (event.key === 'Home') {
          event.preventDefault();
          goTo(0);
        }

        if (event.key === 'End') {
          event.preventDefault();
          goTo(slides.length - 1);
        }
      });

      stage.addEventListener('pointerdown', (event) => {
        dragging = true;
        startX = event.clientX;
        deltaX = 0;
        stage.setPointerCapture?.(event.pointerId);
      });

      stage.addEventListener('pointermove', (event) => {
        if (!dragging) return;
        deltaX = event.clientX - startX;
      });

      stage.addEventListener('pointerup', () => {
        if (!dragging) return;
        dragging = false;

        if (Math.abs(deltaX) >= 55) {
          deltaX < 0 ? next() : prev();
        }

        setTimeout(() => {
          deltaX = 0;
        }, 0);
      });

      stage.addEventListener('pointercancel', () => {
        dragging = false;
        deltaX = 0;
      });

      goTo(0);
    })();
  </script>
</body>
</html>
